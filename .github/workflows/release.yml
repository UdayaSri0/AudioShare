name: Release Packaging

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev libadwaita-1-dev desktop-file-utils appstream dpkg-dev flatpak flatpak-builder curl libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Validate tag/version consistency
        run: |
          VERSION="$(python3 - <<'PY'
from pathlib import Path
import tomllib
data = tomllib.loads(Path('Cargo.toml').read_text())
print(data['workspace']['package']['version'])
PY
)"
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="v${VERSION}"
          echo "workspace version: ${VERSION}"
          echo "git tag: ${TAG}"
          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag mismatch: workspace version=${VERSION} tag=${TAG}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p synchrosonic-app

      - name: Build release artifacts
        run: bash scripts/build-release-artifacts.sh --skip-build

      - name: Publish release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: SynchroSonic ${{ github.ref_name }}
          files: |
            target/release-packaging/*.AppImage
            target/release-packaging/*.deb
            target/release-packaging/*.flatpak
            target/release-packaging/*.tar.gz
            target/release-packaging/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
