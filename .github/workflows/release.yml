name: Release Packaging

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev libadwaita-1-dev desktop-file-utils appstream dpkg-dev flatpak flatpak-builder curl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Validate tag/version consistency
        run: |
          version="$(cargo pkgid -p synchrosonic-app)"
          version="${version##*#}"
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "v$version" != "$tag" ]]; then
            echo "Tag mismatch: cargo version=$version tag=$tag" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p synchrosonic-app

      - name: Build release artifacts
        run: bash scripts/build-release-artifacts.sh --skip-build

      - name: Publish release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: SynchroSonic ${{ github.ref_name }}
          files: |
            target/release-packaging/*.AppImage
            target/release-packaging/*.deb
            target/release-packaging/*.flatpak
            target/release-packaging/*.tar.gz
            target/release-packaging/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
